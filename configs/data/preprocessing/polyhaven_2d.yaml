# @package _global_
defaults:
  - /data/preprocessing/lighting: polyhaven_source_v0
  - /data/preprocessing/rendering: blender_cycles_512
  - /data/preprocessing/views: orbit_1
  - _self_

source:
  name: polyhaven
  root: data/assets
  asset_template: polyhaven/{object_id}.glb

subset_file: configs/data/subsets/polyhaven_pbr_64.yaml
output_root: data/2d_eval/${source.name}
blender_log_dir: ${output_root}/logs
object_ids: null
max_objects: null
# Skip fully completed objects and render only incomplete views. Set false to rerender all.
resume: true
dry_run: false
min_foreground_pixels: 64
